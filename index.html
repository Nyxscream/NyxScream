<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nyxscream | African Creative Sanctuary</title>
    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }
        .container {
            z-index: 2;
            padding: 20px;
            max-width: 600px;
        }
        h1 {
            font-size: 3rem;
            color: #ff0000;
            text-shadow: 0 0 20px #ff0000;
            letter-spacing: 5px;
            text-transform: uppercase;
        }
        p {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #cccccc;
        }
        .highlight {
            color: #ff4d4d;
            font-weight: bold;
        }
        .form-container {
            margin-top: 30px;
            background: rgba(20, 20, 20, 0.8);
            padding: 30px;
            border: 1px solid #333;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.2);
        }
        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            background: #000;
            border: 1px solid #444;
            color: #fff;
            text-transform: uppercase;
            font-size: 0.9rem;
        }
        input:focus {
            outline: none;
            border-color: #ff0000;
        }
        button {
            background: #ff0000;
            color: #fff;
            border: none;
            padding: 15px 30px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }
        button:hover {
            background: #b30000;
            box-shadow: 0 0 20px #ff0000;
        }
        .footer {
            margin-top: 50px;
            font-size: 0.8rem;
            color: #444;
            letter-spacing: 2px;
        }
        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(255, 0, 0, 0.1);
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            animation: scan 4s linear infinite;
        }
        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
    </style>
</head>
<body>
    <div class="scanline"></div>
    <div class="container">
        <h1>Nyxscream</h1>
        <p>The first <span class="highlight">African sanctuary</span> for cinematic creators and faceless animators.</p>
        <p>Earn <strong>Nyx Coins</strong> for your time. Join the Watch Tower.</p>

        <div class="form-container">
            <form action="https://formspree.io/f/mrejdvqd" method="POST">
                <input type="text" name="full_name" placeholder="FULL NAME" required>
                <input type="email" name="email" placeholder="EMAIL ADDRESS" required>
                <input type="tel" name="whatsapp" placeholder="WHATSAPP NUMBER" required>
                <input type="text" name="location" placeholder="LOCATION (CITY & COUNTRY)" required>
                <br>
                <button type="submit">Join the Revolution</button>
            </form>
        </div>
    </div>

    <div class="footer">
        &copy; 2026 NYXSCREAM ARCHIVE. ALL RIGHTS RESERVED.
    </div>
</body>
</html>
