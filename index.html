<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nyxscream | The African Creator Sanctuary</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400&display=swap');

        body {
            background-color: #050505;
            color: #e0e0e0;
            font-family: 'Roboto', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* High-tech Horror Glow Background */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a0505 0%, #050505 70%);
            z-index: -1;
        }

        .container {
            text-align: center;
            padding: 20px;
            max-width: 600px;
            border: 1px solid #330000;
            background: rgba(10, 0, 0, 0.8);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.1);
            border-radius: 8px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            color: #ff0000;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 10px rgba(255, 0, 0, 0.5);
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #b0b0b0;
        }

        .highlight {
            color: #ff3333;
            font-weight: bold;
        }

        .form-container {
            margin-top: 30px;
        }

        input[type="email"] {
            width: 80%;
            padding: 12px;
            background: #111;
            border: 1px solid #440000;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            border-radius: 4px;
            outline: none;
            margin-bottom: 15px;
            transition: border 0.3s;
        }

        input[type="email"]:focus {
            border: 1px solid #ff0000;
        }

        button {
            padding: 12px 30px;
            background-color: #ff0000;
            color: white;
            border: none;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.3s, transform 0.2s;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
        }

        button:hover {
            background-color: #cc0000;
            transform: scale(1.05);
        }

        .footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #444;
            font-family: 'Orbitron', sans-serif;
        }

        /* Scanning effect line */
        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(255, 0, 0, 0.1);
            position: absolute;
            top: 0;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
    </style>
</head>
<body>
    <div class="scanline"></div>
    <div class="container">
        <h1>Nyxscream</h1>
        <p>The first African sanctuary for <span class="highlight">cinematic creators</span> and <span class="highlight">faceless animators</span>.</p>
        <p>Earn <strong>Nyx Coins</strong> for your time. Join the <strong>Watch Tower</strong>. Upgrade your skills at the <strong>Nyxscream Academy</strong>.</p>
        
        <div class="form-container">
            <!-- Replace 'YOUR_FORMSPREE_ID' with your real ID later -->
        <form action="https://formspree.io/f/mrejdvqd" method="POST">
    <input type="text" name="full_name" placeholder="FULL NAME" required>
    <input type="email" name="email" placeholder="EMAIL ADDRESS" required>
    <input type="tel" name="whatsapp" placeholder="WHATSAPP NUMBER" required>
    <input type="text" name="location" placeholder="LOCATION (CITY & COUNTRY)" required>

    <br>
    <button type="submit">Join the Revolution</button>
</form>
    </div>
    <div class="footer">
        &copy; 2026 NYXSCREAM ARCHIVE. ALL RIGHTS RESERVED.
</body>
</html>
